<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/src/assets/mo-1.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <title>Repeet</title>
    </head>
    <body>
        <div id="root"></div>
        <script>
            // Apply theme before React renders to prevent flash
            (function() {
                var theme = localStorage.getItem('repeet-theme') || 'dark';
                document.getElementById('root').setAttribute('data-theme', theme);
                document.documentElement.style.backgroundColor = theme === 'dark' ? '#09090b' : '#f8f8f8';
            })();
        </script>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
